{% extends "classifier/base.html" %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-5 col-md-7">

            <div class="card border-0 shadow-lg rounded-5">

                <div class="card-body p-5">

                    <!-- Header -->
                    <div class="text-center mb-4">

                        <div class="mb-3">

                            <i class="bi bi-person-plus-fill text-primary"
                               style="font-size: 60px;">
                            </i>

                        </div>

                        <h2 class="fw-bold">

                            Регистрация

                        </h2>

                        <p class="text-muted">

                            Создайте аккаунт для работы с системой

                        </p>

                    </div>


                    <!-- Form -->
                    <form method="post">

                        {% csrf_token %}

                        <!-- Username -->
                        <div class="mb-4">

                            <label class="form-label fw-semibold">

                                Username

                            </label>

                            {{ form.username }}

                        </div>


                        <!-- Email -->
                        <div class="mb-4">

                            <label class="form-label fw-semibold">

                                Email

                            </label>

                            {{ form.email }}

                        </div>


                        <!-- Password -->
                        <div class="mb-4">

                            <label class="form-label fw-semibold">

                                Пароль

                            </label>

                            {{ form.password1 }}

                        </div>


                        <!-- Confirm Password -->
                        <div class="mb-4">

                            <label class="form-label fw-semibold">

                                Подтверждение пароля

                            </label>

                            {{ form.password2 }}

                        </div>


                        <!-- Errors -->
                        {% if form.errors %}

                        <div class="alert alert-danger rounded-4">

                            {{ form.errors }}

                        </div>

                        {% endif %}


                        <!-- Button -->
                        <button class="btn btn-primary w-100 py-3 rounded-4 fw-semibold">

                            Создать аккаунт

                        </button>

                    </form>


                    <!-- Login -->
                    <div class="text-center mt-4">

                        <span class="text-muted">

                            Уже есть аккаунт?

                        </span>

                        <a href="/login/"
                           class="text-decoration-none fw-semibold">

                            Войти

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}

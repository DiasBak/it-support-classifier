{% extends "classifier/base.html" %}

{% block content %}

<div class="row">

    <div class="col-lg-6 mx-auto">

        <div class="card border-0 shadow-sm rounded-4">

            <div class="card-header bg-white border-0 p-4">

                <h3 class="fw-bold mb-0">
                    Обработка обращения #{{ ticket.id }}
                </h3>

            </div>

            <div class="card-body p-4">

                <form method="post">

                    {% csrf_token %}

                    <!-- Status -->
                    <div class="mb-4">

                        <label class="form-label fw-semibold">
                            Статус
                        </label>

                        <select name="status"
                                class="form-control">

                            <option value="new">
                                Новое
                            </option>

                            <option value="progress">
                                В обработке
                            </option>

                            <option value="done">
                                Завершено
                            </option>

                        </select>

                    </div>


                    <!-- Priority -->
                    <div class="mb-4">

                        <label class="form-label fw-semibold">
                            Приоритет
                        </label>

                        <select name="priority"
                                class="form-control">

                            <option value="low">
                                Low
                            </option>

                            <option value="medium"
                                    selected>
                                Medium
                            </option>

                            <option value="high">
                                High
                            </option>

                            <option value="critical">
                                Critical
                            </option>

                        </select>

                    </div>


                    <!-- Comment -->
                    <div class="mb-4">

                        <label class="form-label fw-semibold">
                            Комментарий администратора
                        </label>

                        <textarea name="admin_comment"
                                  rows="5"
                                  class="form-control"
                                  placeholder="Введите комментарий...">{{ ticket.admin_comment }}</textarea>

                    </div>


                    <!-- Buttons -->
                    <div class="d-flex gap-3">

                        <button class="btn btn-primary btn-lg">

                            <i class="bi bi-check-circle"></i>
                            Сохранить

                        </button>

                        <a href="/admin-panel/"
                           class="btn btn-outline-dark btn-lg">

                            Назад

                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}

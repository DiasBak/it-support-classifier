{% extends "classifier/base.html" %}

{% block content %}

<div class="row">
  <div class="col-md-4 mx-auto">

    <div class="card p-4">

      <h3 class="mb-4 text-center">
        Вход в систему
      </h3>

      <form method="post">

        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label">Логин</label>
          {{ form.username }}
        </div>

        <div class="mb-3">
          <label class="form-label">Пароль</label>
          {{ form.password }}
        </div>

        <button class="btn btn-primary w-100">
          Войти
        </button>

      </form>

      <div class="text-center mt-3">
        <a href="/register/">
          Нет аккаунта?
        </a>
      </div>

    </div>

  </div>
</div>

{% endblock %}
